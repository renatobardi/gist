name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cross binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}

      - name: Install cross
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --locked

      - name: Install aarch64 binutils
        run: sudo apt-get install -y --no-install-recommends binutils-aarch64-linux-gnu

      - name: Build for aarch64-unknown-linux-musl
        working-directory: knowledge-vault
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Strip binary
        run: aarch64-linux-gnu-strip knowledge-vault/target/aarch64-unknown-linux-musl/release/knowledge-vault

      - name: Verify binary size
        run: |
          SIZE=$(stat -c%s knowledge-vault/target/aarch64-unknown-linux-musl/release/knowledge-vault)
          LIMIT=$((60 * 1024 * 1024))
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "Binary size exceeds 60MB limit: $SIZE bytes"
            exit 1
          fi
          echo "Binary size: $((SIZE / 1024 / 1024))MB"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Oracle Cloud
        run: |
          REMOTE_HOST="${DEPLOY_USER}@${DEPLOY_HOST}"
          BINARY_PATH="knowledge-vault/target/aarch64-unknown-linux-musl/release/knowledge-vault"

          # Upload to a temp path the deploy user can write to; avoids
          # "Permission denied" when the existing binary is root-owned.
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$BINARY_PATH" "${REMOTE_HOST}:/tmp/knowledge-vault-new"

          # Backup, install, and restart — all via sudo in one SSH call
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$REMOTE_HOST" "
            [ -f ${DEPLOY_PATH}/knowledge-vault ] && sudo cp ${DEPLOY_PATH}/knowledge-vault ${DEPLOY_PATH}/knowledge-vault.backup || true
            sudo mv /tmp/knowledge-vault-new ${DEPLOY_PATH}/knowledge-vault
            sudo chmod +x ${DEPLOY_PATH}/knowledge-vault
            sudo systemctl restart knowledge-vault
          "

      - name: Health check
        run: |
          REMOTE_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes ${DEPLOY_USER}@${DEPLOY_HOST}"
          for i in {1..30}; do
            if $REMOTE_SSH "systemctl is-active knowledge-vault" > /dev/null 2>&1; then
              echo "Service is active"
              exit 0
            fi
            echo "Waiting for service to be active... (attempt $i/30)"
            sleep 2
          done

          echo "Health check failed — dumping journal for diagnosis:"
          $REMOTE_SSH "sudo journalctl -u knowledge-vault -n 100 --no-pager" || true
          echo "---"
          $REMOTE_SSH "systemctl status knowledge-vault --no-pager" || true
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f ~/.ssh/known_hosts
