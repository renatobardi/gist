[advisories]
# Transitive dependencies pulled in by surrealdb or async-nats that cannot be
# updated directly. These are acknowledged risks; revisit when the upstream
# crate releases a version that drops or updates these transitive deps.
ignore = [
    "RUSTSEC-2023-0089",  # atomic-polyfill unmaintained (via heapless -> surrealdb)
    "RUSTSEC-2025-0141",  # bincode unmaintained (via surrealdb)
    "RUSTSEC-2026-0002",  # lru IterMut unsound (via surrealkv -> surrealdb)
    "RUSTSEC-2026-0049",  # rustls-webpki CRL matching bug (via async-nats 0.37.0)
    "RUSTSEC-2026-0098",  # rustls-webpki URI name constraint bug (via async-nats 0.37.0)
    "RUSTSEC-2026-0099",  # rustls-webpki wildcard name constraint bug (via async-nats 0.37.0)
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (via async-nats 0.37.0)
]
