[advisories]
# Transitive dependencies pulled in by surrealdb that cannot be updated directly.
# These are acknowledged risks; revisit when surrealdb releases a version that
# drops or updates these crates.
ignore = [
    "RUSTSEC-2023-0089",  # atomic-polyfill unmaintained (via heapless -> surrealdb)
    "RUSTSEC-2025-0141",  # bincode unmaintained (via surrealdb)
    "RUSTSEC-2026-0002",  # lru IterMut unsound (via surrealkv -> surrealdb)
]
